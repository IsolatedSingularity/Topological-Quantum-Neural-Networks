name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb python3-tk
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check tqnn/ --output-format=github

      - name: Type check with mypy
        run: |
          set +e
          mypy tqnn/ --ignore-missing-imports --show-error-codes > /tmp/mypy.txt 2>&1
          exitcode=$?
          cat /tmp/mypy.txt
          if [ $exitcode -ne 0 ]; then
            grep ": error:" /tmp/mypy.txt | while IFS= read -r line; do
              echo "::error::mypy: $line"
            done
          fi
          exit $exitcode

      - name: Run tests
        run: xvfb-run python -m pytest tests/ -v
